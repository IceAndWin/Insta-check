workflows:
  ios:
    name: iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    cache:
      cache_path: ~/.cache
    scripts:
      - flutter clean
      - flutter pub get
      - flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - islammuhtar20@gmail.com
  android:
    name: Android Release
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
    cache:
      cache_path: ~/.cache
    scripts:
      - flutter clean
      - flutter pub get
      - flutter build apk --split-per-abi
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - islammuhtar20@gmail.com
